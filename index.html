<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #a8e6ff, #dff6ff);
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            background: rgba(255, 255, 255, 0.479);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);

            padding: 130px 120px;
            width: min(90%, 400px);

            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);

            text-align: center;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 50px;
            font-size: 24px;
            color: #222;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        button {
            padding: 10px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            border: 1px solid #222;
            transition: 0.2s ease;
        }

        button:hover {
            transform: scale(1.05);
        }

        #yes {
            background: white;
        }

        #no {
            background: #ff4d4d;
            color: white;
            position: relative;
            transition: 0.2s ease;
        }

        .heart {
            position: absolute;
            font-size: 20px;
            animation: floatUp 1.5s linear forwards;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translateY(-150px) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="container" id="container">
        <h1>Do you love me?</h1>

        <div class="buttons">
            <button id="yes">Yes</button>
            <button id="no">No</button>
        </div>
    </div>

<script>
    const noBtn = document.getElementById('no');
    const yesBtn = document.getElementById('yes');
    const container = document.getElementById('container');

    noBtn.addEventListener('mouseenter', () => {

        const x = Math.random() * 250 - 125;
        const y = Math.random() * 120 - 60;

        noBtn.style.transform = `translate(${x}px, ${y}px)`;
    });

    let heartInterval;

    yesBtn.addEventListener('click', () => {

        container.innerHTML = `
            <h1 style="white-space: pre-line;">
HAPPY ANNIVERSARY, MY LOVE!

I LOVE YOU MOST!!! ❤️
            </h1>
        `;

        container.style.backgroundColor = '#ff69b4';
        container.style.color = 'white';
        container.style.fontSize = '2em';

        clearInterval(heartInterval);

        heartInterval = setInterval(() => {

            const heart = document.createElement('div');

            heart.classList.add('heart');
            heart.innerText = '❤️';

            const x = Math.random() * container.offsetWidth;
            const y = container.offsetHeight;

            heart.style.left = `${x}px`;
            heart.style.top = `${y}px`;

            heart.style.fontSize = `${12 + Math.random() * 25}px`;
            heart.style.animationDuration = `${1 + Math.random()}s`;

            container.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 2000);

        }, 150);
    });
</script>

</body>
</html>
